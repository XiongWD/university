# 专业方向（Level1）+ 关联职业权重（P0-1）
# 市场分由关联职业的JobMarketSnapshot加权聚合，非方向级硬编码
# 覆盖志愿推荐主要方向，重点核实外语外贸/师范/数字商务（用户弟弟480+日语场景）

- name: 外语外贸
  description: 日语/英语/翻译+国际贸易/跨境电商复合方向，对日外贸/跨境运营为主
  majors: [日语, 商务英语, 翻译, 国际经济与贸易, 跨境电子商务, 英语]
  career_weights: {对日外贸业务员: 0.30, 跨境电商运营: 0.25, 翻译本地化: 0.20, 日语教师: 0.10, 外贸跟单: 0.15}

- name: 计算机
  description: 软件/算法/数据/运维，需求量大薪资高但竞争激烈
  majors: [计算机科学与技术, 软件工程, 人工智能, 数据科学与大数据技术, 网络工程]
  career_weights: {软件工程师: 0.40, 前端开发: 0.15, 数据分析师: 0.20, 测试工程师: 0.15, 运维工程师: 0.10}

- name: 师范教育
  description: 中小学教师/学前教育，稳定但需考编，人口下降影响长期需求
  majors: [学前教育, 汉语言文学, 数学与应用数学, 英语, 历史学, 物理学]
  career_weights: {中小学教师: 0.55, 幼儿教师: 0.20, 教培讲师: 0.15, 教研员: 0.10}

- name: 财经会计
  description: 金融/会计/审计，传统稳定但基础岗饱和，需证书晋升
  majors: [金融学, 会计学, 财务管理, 审计学, 经济学]
  career_weights: {会计: 0.35, 银行柜员: 0.20, 财务分析: 0.20, 审计: 0.15, 投资顾问: 0.10}

- name: 数字商务
  description: 电商运营/新媒体/数字营销，朝阳行业但技能迭代快
  majors: [网络与新媒体, 电子商务, 市场营销, 数字媒体艺术]
  career_weights: {新媒体运营: 0.30, 电商运营: 0.25, 内容策划: 0.20, 直播运营: 0.15, 数据营销: 0.10}

- name: 医药卫生
  description: 临床/护理/药学，门槛高周期长但稳定，需考研
  majors: [临床医学, 护理学, 药学, 口腔医学, 预防医学]
  career_weights: {临床医师: 0.35, 护士: 0.30, 药剂师: 0.15, 公卫医师: 0.10, 医技: 0.10}

- name: 农林环境
  description: 园林/农学/环境，冷门但部分方向(园林设计)有需求
  majors: [园林, 林学, 农学, 环境工程, 风景园林]
  career_weights: {园林设计师: 0.30, 农技员: 0.25, 环保工程师: 0.20, 林业技术员: 0.15, 施工图设计: 0.10}

- name: 公共管理
  description: 行政/公共事业/社会工作，考公主力方向
  majors: [公共事业管理, 行政管理, 社会工作, 劳动与社会保障]
  career_weights: {公务员: 0.35, 事业单位职员: 0.30, 社区工作者: 0.20, 企业行政: 0.15}
